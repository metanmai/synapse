<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Burgundy circle background -->
  <circle cx="16" cy="16" r="15" fill="#561C24"/>
  <!-- Connection lines (tan) -->
  <line x1="16" y1="8" x2="8" y2="22" stroke="#C7B7A3" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="24" y2="22" stroke="#C7B7A3" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="24" y2="22" stroke="#C7B7A3" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="16" y2="19" stroke="#C7B7A3" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="16" y2="19" stroke="#C7B7A3" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="16" y2="19" stroke="#C7B7A3" stroke-width="1" stroke-linecap="round"/>
  <!-- Outer nodes (cream white) -->
  <circle cx="16" cy="8" r="2.5" fill="#FFFDF8"/>
  <circle cx="8" cy="22" r="2" fill="#FFFDF8"/>
  <circle cx="24" cy="22" r="2" fill="#FFFDF8"/>
  <!-- Center node with accent glow -->
