<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Burgundy circle background -->
  <circle cx="20" cy="20" r="19" fill="#561C24"/>
  <!-- Connection lines (tan, drawn before nodes so nodes appear on top) -->
  <line x1="20" y1="10" x2="10" y2="27" stroke="#C7B7A3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="10" x2="30" y2="27" stroke="#C7B7A3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="27" x2="30" y2="27" stroke="#C7B7A3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="10" x2="20" y2="24" stroke="#C7B7A3" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="10" y1="27" x2="20" y2="24" stroke="#C7B7A3" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="30" y1="27" x2="20" y2="24" stroke="#C7B7A3" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Outer nodes (cream white) -->
  <circle cx="20" cy="10" r="3" fill="#FFFDF8"/>
  <circle cx="10" cy="27" r="2.5" fill="#FFFDF8"/>
  <circle cx="30" cy="27" r="2.5" fill="#FFFDF8"/>
  <!-- Center node (slightly larger, with glow accent) -->
  <circle cx="20" cy="24" r="3.5" fill="#6D2932"/>
  <circle cx="20" cy="24" r="2.5" fill="#FFFDF8"/>
</svg>
