name: Feature request
description: Suggest an idea for Synapse
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Share your idea. For large changes, opening a discussion first can help align on direction.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? APIs, UX, MCP tools, etc.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — other approaches or workarounds.
