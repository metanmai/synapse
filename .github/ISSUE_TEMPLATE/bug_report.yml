name: Bug report
description: File a bug to help us improve Synapse
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Security issues must **not** be reported here — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Clear, short summary of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How can we reproduce it?
      description: Steps, commands, or a minimal repro. Include relevant paths or endpoints.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app (SvelteKit)
        - Worker / API
        - MCP package (synapsesync-mcp)
        - Database / Supabase
        - Docs / other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: e.g. MCP npm version, git SHA, or "main @ date"
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: OS, Node version, browser (if UI), Cloudflare/Supabase region if relevant.
    validations:
      required: false
